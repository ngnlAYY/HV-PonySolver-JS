name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Render test Wrangler config
        env:
          MODEL_KEYS_KV_NAMESPACE_ID: test-kv
          MODEL_BUCKET_NAME: test-bucket
        run: pnpm --filter @hv-pony-solver/model-worker render-config

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
