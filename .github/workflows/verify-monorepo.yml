name: Verify Monorepo

on:
  workflow_dispatch:
    inputs:
      bundle_onnx_runtime:
        description: 'Build userscript with bundled onnxruntime-web JS runtime'
        type: boolean
        required: true
        default: false
      publish_userscript_artifact:
        description: 'Publish userscript artifact from this run'
        type: boolean
        required: true
        default: false

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Require bundled runtime for published userscript artifacts
        if: ${{ inputs.publish_userscript_artifact && !inputs.bundle_onnx_runtime }}
        run: |
          echo "Publishing userscript artifacts requires bundle_onnx_runtime=true" >&2
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Render test Wrangler config
        env:
          MODEL_KEYS_KV_NAMESPACE_ID: test-kv
          MODEL_BUCKET_NAME: test-bucket
        run: pnpm --filter @hv-pony-solver/model-worker render-config

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Build bundled userscript
        if: ${{ inputs.bundle_onnx_runtime }}
        run: pnpm --filter @hv-pony-solver/userscript build:bundled-runtime

      - name: Publish userscript artifact
        if: ${{ inputs.publish_userscript_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: hv-pony-solver-userscript
          path: apps/userscript/dist/hv-pony-solver.user.js
          if-no-files-found: error
